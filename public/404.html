<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Buwuhan - Memuat...</title>
    <style>
      body {
        background-color: #0f0f0f;
        color: #f5f0e8;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      .loader {
        border: 3px solid rgba(217, 119, 6, 0.1);
        border-top: 3px solid #fbbf24;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .logo { margin-bottom: 20px; filter: grayscale(1) opacity(0.5); }
    </style>
    <script type="text/javascript">
      // Sederhanakan: Kirim pathname + search + hash sebagai query param 'p'
      var l = window.location;
      var path = l.pathname + l.search + l.hash;
      // Gunakan replace agar tidak masuk ke history
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/?p=' + encodeURIComponent(path));
    </script>
  </head>
  <body>
    <div class="logo">
      <img src="/favicon.svg" alt="Buwuhan" width="48" height="48">
    </div>
    <div class="loader"></div>
    <div style="font-size: 0.9rem; color: #6b5f52;">Mengarahkan...</div>
  </body>
</html>
