    <!-- PWA & Mobile Optimization -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- OpenGraph / Facebook (SEO) -->

    <title>Buwuhan – Catatan Sumbangan Hajatan</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/javascript">
      // Trik SPA untuk GitHub Pages (Single Page Apps)
      // Menangkap kembali path yang dikirim melalui query parameter 'p' oleh 404.html
      (function(l) {
        if (l.search) {
          var params = new URLSearchParams(l.search);
          var p = params.get('p');
          if (p !== null) {
            var newUrl = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + p + l.hash;
            window.history.replaceState(null, null, newUrl);
          }
        }
      }(window.location))
    </script>
    <script type="module" src="src/main.jsx"></script>
  </body>
</html>
